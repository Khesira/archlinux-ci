name: Build Arch Linux QCOW2 Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - name: Build in Arch Container
          run: |
            # Manually start Arch container and mount dev of host
            docker run --privileged --rm \
              -v /dev:/dev \
              -v $(pwd):/build \
              archlinux:latest \
              /bin/bash -c "pacman -Syu --noconfirm arch-install-scripts qemu-base dosfstools e2fsprogs; cd /build; ./build.sh"